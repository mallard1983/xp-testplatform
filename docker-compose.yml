name: xp-testplatform

# Pin all image versions before publishing — no latest tags in production runs.
# Current pins are reasonable defaults; verify against release notes before a registered run.

services:
  neo4j:
    image: neo4j:5.18.0
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme}
    volumes:
      - ./data/active_neo4j/data:/data
      - ./data/active_neo4j/logs:/logs
    networks:
      - xp-net
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-embed:
    image: ollama/ollama:0.4.7
    volumes:
      - ollama_models:/root/.ollama
      - ./scripts/ollama_init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - xp-net
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q nomic-embed-text || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  substrate-api:
    build:
      context: ./substrate
      dockerfile: Dockerfile
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme}
      OLLAMA_EMBED_URL: http://ollama-embed:11434
      EMBED_MODEL: nomic-embed-text
    networks:
      - xp-net
    depends_on:
      neo4j:
        condition: service_healthy
      ollama-embed:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mcp-server:
    build:
      context: ./substrate
      dockerfile: Dockerfile.mcp
    environment:
      SUBSTRATE_API_URL: http://substrate-api:8000
    networks:
      - xp-net
    depends_on:
      substrate-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      SUBSTRATE_API_URL: http://substrate-api:8000
      MCP_SERVER_URL: http://mcp-server:8080/sse
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme}
      # Used by neo4j_manager to stop/start the container between test runs
      NEO4J_CONTAINER_NAME: xp-testplatform-neo4j-1
      DATA_DIR: /app/data
      RESULTS_DIR: /app/results
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./config:/app/config:ro
      # Docker socket — used by neo4j_manager to stop/restart neo4j between tests
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - xp-net
    depends_on:
      substrate-api:
        condition: service_healthy
      mcp-server:
        condition: service_healthy

networks:
  xp-net:
    driver: bridge

volumes:
  # Ollama model cache — persists between runs so nomic-embed-text is not re-downloaded
  ollama_models:
